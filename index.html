      tailwind.config = {

                600: 'rgb(var(--crema-600) / <alpha-value>)',
              },

                500: 'rgb(var(--ocean-500) / <alpha-value>)',
                600: 'rgb(var(--ocean-600) / <alpha-value>)',

              'on-surface-variant': 'var(--md-sys-color-on-surface-variant)',

              'on-primary-container': 'var(--md-sys-color-on-primary-container)',

              'copyright-text': 'var(--color-copyright-text)',
              'nav-active-bg': 'var(--color-nav-active-bg)',
              'nav-active-text': 'var(--color-nav-active-text)',
            },
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
            animation: {
              'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
              'slide-up-fade': 'slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
              'scale-in': 'scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
              'pulse-subtle': 'pulseSubtle 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'spin-slow': 'spin 3s linear infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUpFade: {
                '0%': { opacity: '0', transform: 'translateY(40px) scale(0.95)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.9)' },

              },
              pulseSubtle: {

      body {
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior-y: none;
        transition: background-color 0.5s cubic-bezier(0.2, 0, 0, 1);
        margin: 0;
      }
      
      input, button, textarea, select { font-family: inherit; }
      
      div, button, span, svg, header, nav {
        transition-property: background-color, border-color, color, fill, stroke, transform, box-shadow, opacity;
        transition-duration: 300ms;
        transition-timing-function: cubic-bezier(0.2, 0, 0, 1);
      }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--md-sys-color-surface-container-high); border-radius: 4px; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Force hide number input spinners */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type=number] {
        -moz-appearance: textfield;
      }

      /* --- SAMSUNG S25 ULTRA SIMULATOR FOR DESKTOP/PREVIEW --- */
      @media (min-width: 500px) {
        body {
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background-color: #f0f0f0; 
          background-image: radial-gradient(#ccc 1px, transparent 1px);
          background-size: 20px 20px;
        }

        #root {
          width: 412px; 
          height: 915px; 
          max-height: 95vh;
          border-radius: 12px; 
          border: 6px solid #e0e0e0; 
          box-shadow: 0 0 0 2px #ccc, 0 20px 50px rgba(0,0,0,0.2);
          position: relative;
          overflow: hidden;
          background-color: var(--md-sys-color-surface);
          --safe-top: 40px;    
          --safe-bottom: 20px; 
        }

        #root::after {
          content: '';
          position: absolute;
          top: 12px;
          left: 50%;
          transform: translateX(-50%);
          width: 14px;
          height: 14px;
          background-color: #000;
          border-radius: 50%;
          z-index: 9999;
          pointer-events: none;
          box-shadow: 0 0 2px rgba(0,0,0,0.5);
        }
      }

    <script>
      // Register Service Worker with Relative Path and Error Handling for Preview Environments
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Changed from '/sw.js' to './sw.js' for better relative path handling
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              // Ignore secure context/origin errors common in preview iframes
              if(registrationError.message && (registrationError.message.includes('origin') || registrationError.message.includes('secure context'))) {
                  console.warn('SW registration skipped (Preview Environment):', registrationError.message);
              } else {
                  console.log('SW registration failed: ', registrationError);
              }
            });
        });
      }
    </script>
